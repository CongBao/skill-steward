    <text x="0" y="68" fill="#f8fafc" font-size="55" font-weight="730" letter-spacing="-1.8">for Agent Skills</text>
    <text x="2" y="168" fill="#aeb9ca" font-size="23" font-weight="430">
      One local, proof-aware path from task intent to reviewed change.
    </text>

    <g transform="translate(0 212)" font-size="17" font-weight="590">
      <g>
        <rect width="184" height="44" rx="22" fill="#13272a" stroke="#2dd4bf" stroke-opacity="0.42" />
        <circle cx="23" cy="22" r="5" fill="#5eead4" />
        <text x="38" y="28" fill="#d7fff9">Task preflight</text>
      </g>
      <g transform="translate(198 0)">
        <rect width="236" height="44" rx="22" fill="#1d1b32" stroke="#a78bfa" stroke-opacity="0.42" />
        <circle cx="23" cy="22" r="5" fill="#a78bfa" />
        <text x="38" y="28" fill="#eee8ff">Missing-Skill discovery</text>
      </g>
      <g transform="translate(0 58)">
        <rect width="178" height="44" rx="22" fill="#202319" stroke="#fbbf24" stroke-opacity="0.4" />
        <circle cx="23" cy="22" r="5" fill="#fbbf24" />
        <text x="38" y="28" fill="#fff5cf">Local evidence</text>
      </g>
