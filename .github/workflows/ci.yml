name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: mkdir -p artifacts
      - name: Pack from a clean checkout
        run: pnpm --filter skill-steward pack --pack-destination artifacts
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  windows-smoke:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Windows integration journal smoke
        run: pnpm --filter @skill-steward/store exec vitest run tests/integration-store.windows.test.ts
      - name: Build CLI
        run: pnpm build
      - name: Run packaged CLI help
        run: node packages/cli/dist/main.js --help
