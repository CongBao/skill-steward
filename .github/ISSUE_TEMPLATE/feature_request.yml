name: Feature request
description: Propose a focused capability or compatibility improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user decision or workflow is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed outcome
      description: Describe behavior and acceptance evidence, not only implementation.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Task Preflight and Skill discovery
        - Harness integration
        - Evidence and recommendation quality
        - Installation and reversible governance
        - Inventory and analysis
        - Dashboard and CLI
        - Harness compatibility
        - Documentation
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
