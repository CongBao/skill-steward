name: CLI package publication

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the verified CLI package to npm
        required: true
        type: boolean
        default: false
      authentication:
        description: Use trusted publishing, except for the reviewed one-time package bootstrap
        required: true
        type: choice
        default: trusted-publisher
        options:
          - trusted-publisher
          - bootstrap-token

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release contract
        run: pnpm release:check
      - name: Pack the exact CLI artifact
        run: |
          mkdir -p artifacts/cli
          pnpm --filter skill-steward pack --pack-destination artifacts/cli
      - name: Verify the CLI artifact
        run: node scripts/verify-cli-package.mjs artifacts/cli/skill-steward-*.tgz
      - name: Prove publisher check-only is offline
        run: node scripts/publish-cli-package.mjs --check-only artifacts/cli/skill-steward-*.tgz
      - name: Preserve the independently built trusted package tree
        run: |
          mkdir -p artifacts/cli/trusted-package-tree
          cp packages/cli/LICENSE packages/cli/README.md packages/cli/package.json artifacts/cli/trusted-package-tree/
          cp -R packages/cli/dist artifacts/cli/trusted-package-tree/dist
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: skill-steward-cli-${{ github.sha }}
          path: |
            artifacts/cli/skill-steward-*.tgz
            artifacts/cli/trusted-package-tree
          if-no-files-found: error
          retention-days: 1

  prepare-publisher:
    if: ${{ inputs.publish && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
          registry-url: https://registry.npmjs.org
      - name: Acquire the pinned npm publisher client without OIDC
        run: |
          mkdir -p artifacts/npm-client
          npm pack npm@11.17.0 --ignore-scripts --pack-destination artifacts/npm-client
          node scripts/verify-pinned-npm-client.mjs artifacts/npm-client/npm-11.17.0.tgz
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: npm-publisher-client-${{ github.sha }}
          path: artifacts/npm-client/npm-11.17.0.tgz
          if-no-files-found: error
          retention-days: 1

  publish:
    if: ${{ inputs.publish && github.ref == 'refs/heads/main' }}
    needs: [build, prepare-publisher]
    runs-on: ubuntu-24.04
    environment: cli-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
          registry-url: https://registry.npmjs.org
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: skill-steward-cli-${{ github.sha }}
          path: artifacts/cli
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: npm-publisher-client-${{ github.sha }}
          path: artifacts/npm-client
      - name: Verify and expose the pinned npm publisher client
        run: |
          node scripts/verify-pinned-npm-client.mjs artifacts/npm-client/npm-11.17.0.tgz
          tar -xzf artifacts/npm-client/npm-11.17.0.tgz -C artifacts/npm-client
          test "$(node artifacts/npm-client/package/bin/npm-cli.js --version)" = "11.17.0"
      - name: Publish with npm trusted publishing
        if: ${{ inputs.authentication == 'trusted-publisher' }}
        run: >-
          node scripts/publish-cli-package.mjs
          --npm-cli artifacts/npm-client/package/bin/npm-cli.js
          --trusted-package-directory artifacts/cli/trusted-package-tree
          --workspace-root .
          artifacts/cli/skill-steward-*.tgz
      - name: Bootstrap the package with the short-lived environment token
        if: ${{ inputs.authentication == 'bootstrap-token' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_BOOTSTRAP_TOKEN }}
        run: |
          test -n "$NODE_AUTH_TOKEN"
          export NPM_CONFIG_USERCONFIG="$RUNNER_TEMP/skill-steward-bootstrap.npmrc"
          trap 'rm -f "$NPM_CONFIG_USERCONFIG"' EXIT
          printf '%s\n' '//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}' > "$NPM_CONFIG_USERCONFIG"
          node scripts/publish-cli-package.mjs \
            --npm-cli artifacts/npm-client/package/bin/npm-cli.js \
            --trusted-package-directory artifacts/cli/trusted-package-tree \
            --workspace-root . \
            artifacts/cli/skill-steward-*.tgz

  registry-smoke:
    needs: publish
    strategy:
      fail-fast: false
      matrix:
        runner:
          - ubuntu-24.04
          - macos-15
          - windows-latest
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
          registry-url: https://registry.npmjs.org
      - name: Pin registry-install client
        run: npm install --global npm@11.17.0
      - name: Install and exercise the public registry package
        run: node scripts/verify-registry-install.mjs
