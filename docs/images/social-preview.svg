<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640" role="img" aria-labelledby="title description">
  <title id="title">Skill Steward</title>
  <desc id="description">Cross-Harness operations for Agent Skills: task preflight, missing-Skill discovery, local evidence, and reversible governance.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080b12" />
      <stop offset="0.58" stop-color="#101625" />
      <stop offset="1" stop-color="#17122a" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4" />
      <stop offset="1" stop-color="#a78bfa" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b2334" />
      <stop offset="1" stop-color="#111724" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M 32 0 L 0 0 0 32" fill="none" stroke="#94a3b8" stroke-opacity="0.05" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#020617" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="1280" height="640" rx="32" fill="url(#background)" />
  <rect width="1280" height="640" rx="32" fill="url(#grid)" />
  <circle cx="1130" cy="84" r="210" fill="#8b5cf6" opacity="0.08" />
  <circle cx="950" cy="610" r="260" fill="#14b8a6" opacity="0.07" />

  <g transform="translate(72 70)">
