    <path d="m17 20.5 11 6.7 11-6.7M28 27.2V40" fill="none" stroke="url(#accent)" stroke-width="2.6" stroke-linejoin="round" />
    <text x="76" y="40" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="31" font-weight="700" letter-spacing="-0.5">Skill Steward</text>
  </g>

