name: Attested GitHub prerelease

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish the attested assets as a GitHub prerelease
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: skill-steward-github-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  assemble:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Bind the release contract to this checkout
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          pnpm release:check
      - name: Build the trusted package tree
        run: pnpm --filter skill-steward... build
      - name: Assemble exact npm registry bytes
        run: |
          node scripts/assemble-release-assets.mjs --source-commit "$GITHUB_SHA" --output artifacts/release
      - name: Verify the exact release asset set offline
        run: node scripts/verify-release-assets.mjs --source-commit "$GITHUB_SHA" artifacts/release
      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: skill-steward-release-${{ github.sha }}
          path: artifacts/release/*
          if-no-files-found: error
          retention-days: 7

  attest:
    if: ${{ inputs.publish && github.ref == 'refs/heads/main' }}
    needs: assemble
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: skill-steward-release-${{ github.sha }}
          path: artifacts/release
      - name: Reverify the downloaded release envelope
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          node scripts/verify-release-assets.mjs --envelope-only --source-commit "$GITHUB_SHA" artifacts/release
      - name: Attest the exact registry-byte asset set
        uses: actions/attest@a1948c3f048ba23858d222213b7c278aabede763 # v4.1.1
        with:
          subject-path: |
            artifacts/release/*.tgz
            artifacts/release/release-manifest.json
            artifacts/release/SHA256SUMS

  publish:
    needs: attest
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    environment: github-release
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22.22.1
      - uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6
        with:
          name: skill-steward-release-${{ github.sha }}
          path: artifacts/release
      - name: Reverify the downloaded release envelope
        run: |
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          node scripts/verify-release-assets.mjs --envelope-only --source-commit "$GITHUB_SHA" artifacts/release
      - name: Publish or resume the verified GitHub prerelease
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node scripts/publish-github-release.mjs --source-commit "$GITHUB_SHA" artifacts/release
