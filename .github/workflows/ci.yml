name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release contract
        run: pnpm release:check
      - run: mkdir -p artifacts/npm artifacts/pnpm
      - name: Pack with pnpm from a clean checkout
        run: pnpm --filter skill-steward pack --pack-destination artifacts/pnpm
      - name: Inspect npm pack dry-run
        working-directory: packages/cli
        run: npm pack --dry-run --ignore-scripts --json > ../../artifacts/pack-dry-run.json
      - name: Pack the built artifact with npm
        working-directory: packages/cli
        run: npm pack --ignore-scripts --json --pack-destination ../../artifacts/npm
      - name: Verify dry-run package contents
        run: node scripts/verify-cli-package.mjs --dry-run artifacts/pack-dry-run.json
      - name: Verify pnpm packed artifact
        run: node scripts/verify-cli-package.mjs artifacts/pnpm/skill-steward-*.tgz
      - name: Verify npm packed artifact
        run: node scripts/verify-cli-package.mjs artifacts/npm/skill-steward-*.tgz
      - name: Build
        run: pnpm build
      - name: Typecheck
        run: pnpm typecheck
      - name: Test
        run: pnpm test

  windows-security:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release contract
        run: pnpm release:check
      - name: Build integration workspace
        run: pnpm --filter @skill-steward/integrations... build
      - name: Windows integration journal smoke
        run: pnpm --filter @skill-steward/store exec vitest run tests/integration-store.windows.test.ts
      - name: Windows integration safety
        run: pnpm --filter @skill-steward/integrations exec vitest run tests/integration-platform.windows.test.ts
      - name: Build CLI
        run: pnpm build
      - name: Windows local candidate policy
        run: pnpm --filter skill-steward exec vitest run tests/local-candidate.test.mjs
      - name: Install and verify the Windows local candidate
        run: >-
          pnpm candidate:install -- --output artifacts/local-candidate
          --prefix artifacts/local-prefix --json
      - name: Smoke the installed Windows candidate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts/home, artifacts/state | Out-Null
          $env:HOME = (Resolve-Path artifacts/home).Path
          $env:SKILL_STEWARD_HOME = (Resolve-Path artifacts/state).Path
          $binary = (Resolve-Path artifacts/local-prefix/skill-steward.cmd).Path
          $expected = (Get-Content release-contract.json | ConvertFrom-Json).version
          if ((& $binary --version).Trim() -ne $expected) { throw "Candidate version mismatch" }
          & $binary scan --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "scan help failed" }
          & $binary preflight --help | Out-Null
          if ($LASTEXITCODE -ne 0) { throw "preflight help failed" }
          $plan = (& $binary integrate plan --harness codex --json | ConvertFrom-Json)
          if ($plan.availability.available -ne $false) { throw "Windows lifecycle unexpectedly available" }
          if ($plan.availability.reason -ne "INTEGRATION_NATIVE_CAPABILITY_UNAVAILABLE") {
            throw "Unexpected Windows lifecycle reason"
          }
      - name: Run packaged CLI help
        run: node packages/cli/dist/main.js --help

  macos-security:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify release contract
        run: pnpm release:check
      - name: Build integration workspace
        run: pnpm --filter @skill-steward/integrations... build
      - name: Build and verify Darwin mutation helper
        working-directory: packages/rename-noreplace-darwin-arm64
        run: node ../../scripts/build-native-rename-noreplace.mjs darwin arm64 none
      - name: Install and verify the macOS local candidate
        run: pnpm --filter skill-steward exec vitest run tests/local-candidate.test.mjs
      - name: macOS integration safety
        run: >-
          pnpm --filter @skill-steward/integrations exec vitest run
          tests/companion-manifest.test.ts
          tests/companion-owned-tree-native.test.ts
          tests/integration-process-crash.test.ts
          tests/integration-recovery-coordinator.test.ts
