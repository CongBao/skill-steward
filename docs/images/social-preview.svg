  <rect x="72" y="582" width="1136" height="1" fill="url(#accent)" opacity="0.4" />
  <text x="72" y="611" fill="#8493aa" font-family="Inter, ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="580" letter-spacing="0.6">CODEX · CLAUDE CODE · GITHUB COPILOT CLI</text>
