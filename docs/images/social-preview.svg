        <path d="m26 31 6 6 11-13" fill="none" stroke="#5eead4" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" />
        <text x="62" y="26" fill="#e7faf7" font-size="15" font-weight="680">requesting-code-review</text>
        <text x="62" y="45" fill="#7dd3c7" font-size="12">installed · distinct task value</text>
        <rect x="311" y="20" width="48" height="23" rx="11.5" fill="#17463f" />
        <text x="325" y="36" fill="#7ff4df" font-size="11" font-weight="700">USE</text>
      </g>
      <g transform="translate(0 100)">
        <rect width="376" height="62" rx="14" fill="#1c1930" stroke="#8b5cf6" stroke-opacity="0.46" />
        <rect x="16" y="15" width="32" height="32" rx="9" fill="#302452" />
        <path d="M32 23v16M24 31h16" fill="none" stroke="#b9a4ff" stroke-width="2.4" stroke-linecap="round" />
        <text x="62" y="26" fill="#f0ecff" font-size="15" font-weight="680">security-review</text>
        <text x="62" y="45" fill="#b5a7e8" font-size="12">not installed · reviewed candidate</text>
        <rect x="294" y="20" width="65" height="23" rx="11.5" fill="#3a2764" />
        <text x="305" y="36" fill="#c9b9ff" font-size="11" font-weight="700">REVIEW</text>
      </g>
    </g>

    <g transform="translate(24 354)">
      <path d="M0 0h376" stroke="#334155" />
      <text x="0" y="35" fill="#8290a6" font-size="12" font-weight="640">LOCAL · DETERMINISTIC · REVIEWED</text>
